<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi Zero 2 W piCorePlayer wiring diagram</title>
  <desc id="desc">Wiring overview for Raspberry Pi Zero 2 W, PCM5102A DAC, PAM8403 amplifier, OLED display, buttons, and speakers.</desc>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d33f49"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d98324"/>
    </marker>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#30343f"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#246eb9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c9a5f"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59606d"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .board { fill: #ffffff; stroke: #243042; stroke-width: 2; }
      .module { fill: #ffffff; stroke: #536176; stroke-width: 2; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2e394d; }
      .tiny { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2e394d; }
      .pin { fill: #f4f6f9; stroke: #9aa6b8; stroke-width: 1; }
      .pin-dot { fill: #f4f6f9; stroke: #8b98aa; stroke-width: 1.2; }
      .pin-5v { fill: #ffd9dc; stroke: #d33f49; stroke-width: 2; }
      .pin-3v3 { fill: #ffe7c2; stroke: #d98324; stroke-width: 2; }
      .pin-gnd { fill: #dfe3ea; stroke: #30343f; stroke-width: 2; }
      .pin-i2s { fill: #d8eaff; stroke: #246eb9; stroke-width: 2; }
      .pin-i2c { fill: #d9f1e4; stroke: #2c9a5f; stroke-width: 2; }
      .pin-button { fill: #eadfff; stroke: #9b6a30; stroke-width: 2; }
      .pin-purple { fill: #eadfff; stroke: #7c4dff; stroke-width: 2; }
      .pin-gray { fill: #edf0f5; stroke: #59606d; stroke-width: 2; }
      .red { stroke: #d33f49; }
      .orange { stroke: #d98324; }
      .black { stroke: #30343f; }
      .blue { stroke: #246eb9; }
      .green { stroke: #2c9a5f; }
      .purple { stroke: #7c4dff; }
      .gray { stroke: #59606d; }
      .brown { stroke: #9b6a30; }
      .wire { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #fff8e6; stroke: #d49d2f; stroke-width: 1.5; }
      .legend { fill: #ffffff; stroke: #d1d8e3; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980"/>
  <text class="title" x="700" y="42" text-anchor="middle">Bamboo piCorePlayer Zero 2 W Wiring Overview</text>

  <!-- Raspberry Pi Zero 2 W -->
  <rect class="board" x="435" y="255" width="350" height="485" rx="16"/>
  <text class="label" x="610" y="290" text-anchor="middle">Raspberry Pi Zero 2 W</text>
  <text class="small" x="610" y="313" text-anchor="middle">piCorePlayer / Squeezelite</text>

  <rect x="475" y="390" width="74" height="92" rx="6" fill="#e7edf4" stroke="#aab5c5"/>
  <text class="tiny" x="512" y="430" text-anchor="middle">CPU</text>
  <text class="tiny" x="512" y="448" text-anchor="middle">Wi-Fi</text>
  <rect x="490" y="650" width="78" height="26" rx="4" fill="#e7edf4" stroke="#aab5c5"/>
  <text class="tiny" x="529" y="668" text-anchor="middle">USB PWR</text>

  <!-- Full 40-pin GPIO header. Odd pins are on the left, even pins on the right. -->
  <g>
    <text class="label" x="688" y="340" text-anchor="middle">40-pin GPIO header</text>
    <text class="tiny" x="654" y="356" text-anchor="middle">odd</text>
    <text class="tiny" x="690" y="356" text-anchor="middle">even</text>

    <text class="tiny" x="642" y="364" text-anchor="end">1 3V3</text><circle class="pin-dot pin-3v3" cx="654" cy="360" r="5"/><circle class="pin-dot pin-5v" cx="690" cy="360" r="5"/><text class="tiny" x="702" y="364">2 5V</text>
    <text class="tiny" x="642" y="379" text-anchor="end">3 SDA</text><circle class="pin-dot pin-i2c" cx="654" cy="375" r="5"/><circle class="pin-dot pin-5v" cx="690" cy="375" r="5"/><text class="tiny" x="702" y="379">4 5V</text>
    <text class="tiny" x="642" y="394" text-anchor="end">5 SCL</text><circle class="pin-dot pin-i2c" cx="654" cy="390" r="5"/><circle class="pin-dot pin-gnd" cx="690" cy="390" r="5"/><text class="tiny" x="702" y="394">6 GND</text>
    <text class="tiny" x="642" y="409" text-anchor="end">7 GPIO4</text><circle class="pin-dot" cx="654" cy="405" r="5"/><circle class="pin-dot" cx="690" cy="405" r="5"/><text class="tiny" x="702" y="409">8 GPIO14</text>
    <text class="tiny" x="642" y="424" text-anchor="end">9 GND</text><circle class="pin-dot pin-gnd" cx="654" cy="420" r="5"/><circle class="pin-dot" cx="690" cy="420" r="5"/><text class="tiny" x="702" y="424">10 GPIO15</text>
    <text class="tiny" x="642" y="439" text-anchor="end">11 GPIO17</text><circle class="pin-dot" cx="654" cy="435" r="5"/><circle class="pin-dot pin-i2s" cx="690" cy="435" r="5"/><text class="tiny" x="702" y="439">12 BCK</text>
    <text class="tiny" x="642" y="454" text-anchor="end">13 GPIO27</text><circle class="pin-dot" cx="654" cy="450" r="5"/><circle class="pin-dot pin-gnd" cx="690" cy="450" r="5"/><text class="tiny" x="702" y="454">14 GND</text>
    <text class="tiny" x="642" y="469" text-anchor="end">15 GPIO22</text><circle class="pin-dot" cx="654" cy="465" r="5"/><circle class="pin-dot pin-button" cx="690" cy="465" r="5"/><text class="tiny" x="702" y="469">16 GPIO23</text>
    <text class="tiny" x="642" y="484" text-anchor="end">17 3V3</text><circle class="pin-dot pin-3v3" cx="654" cy="480" r="5"/><circle class="pin-dot pin-button" cx="690" cy="480" r="5"/><text class="tiny" x="702" y="484">18 GPIO24</text>
    <text class="tiny" x="642" y="499" text-anchor="end">19 GPIO10</text><circle class="pin-dot" cx="654" cy="495" r="5"/><circle class="pin-dot pin-gnd" cx="690" cy="495" r="5"/><text class="tiny" x="702" y="499">20 GND</text>
    <text class="tiny" x="642" y="514" text-anchor="end">21 GPIO9</text><circle class="pin-dot" cx="654" cy="510" r="5"/><circle class="pin-dot" cx="690" cy="510" r="5"/><text class="tiny" x="702" y="514">22 GPIO25</text>
    <text class="tiny" x="642" y="529" text-anchor="end">23 GPIO11</text><circle class="pin-dot" cx="654" cy="525" r="5"/><circle class="pin-dot" cx="690" cy="525" r="5"/><text class="tiny" x="702" y="529">24 GPIO8</text>
    <text class="tiny" x="642" y="544" text-anchor="end">25 GND</text><circle class="pin-dot pin-gnd" cx="654" cy="540" r="5"/><circle class="pin-dot" cx="690" cy="540" r="5"/><text class="tiny" x="702" y="544">26 GPIO7</text>
    <text class="tiny" x="642" y="559" text-anchor="end">27 GPIO0</text><circle class="pin-dot" cx="654" cy="555" r="5"/><circle class="pin-dot" cx="690" cy="555" r="5"/><text class="tiny" x="702" y="559">28 GPIO1</text>
    <text class="tiny" x="642" y="574" text-anchor="end">29 GPIO5</text><circle class="pin-dot" cx="654" cy="570" r="5"/><circle class="pin-dot pin-gnd" cx="690" cy="570" r="5"/><text class="tiny" x="702" y="574">30 GND</text>
    <text class="tiny" x="642" y="589" text-anchor="end">31 GPIO6</text><circle class="pin-dot" cx="654" cy="585" r="5"/><circle class="pin-dot" cx="690" cy="585" r="5"/><text class="tiny" x="702" y="589">32 GPIO12</text>
    <text class="tiny" x="642" y="604" text-anchor="end">33 GPIO13</text><circle class="pin-dot" cx="654" cy="600" r="5"/><circle class="pin-dot pin-gnd" cx="690" cy="600" r="5"/><text class="tiny" x="702" y="604">34 GND</text>
    <text class="tiny" x="642" y="619" text-anchor="end">35 RCK</text><circle class="pin-dot pin-i2s" cx="654" cy="615" r="5"/><circle class="pin-dot" cx="690" cy="615" r="5"/><text class="tiny" x="702" y="619">36 GPIO16</text>
    <text class="tiny" x="642" y="634" text-anchor="end">37 GPIO26</text><circle class="pin-dot" cx="654" cy="630" r="5"/><circle class="pin-dot" cx="690" cy="630" r="5"/><text class="tiny" x="702" y="634">38 GPIO20</text>
    <text class="tiny" x="642" y="649" text-anchor="end">39 GND</text><circle class="pin-dot pin-gnd" cx="654" cy="645" r="5"/><circle class="pin-dot pin-i2s" cx="690" cy="645" r="5"/><text class="tiny" x="702" y="649">40 DIN</text>
  </g>

  <!-- OLED -->
  <rect class="module" x="455" y="88" width="300" height="120" rx="12"/>
  <rect x="495" y="124" width="132" height="42" rx="5" fill="#202736" stroke="#4c596e"/>
  <text class="label" x="665" y="128">I2C OLED</text>
  <text class="small" x="665" y="152">SSD1306, address 0x3c</text>
  <text class="tiny" x="665" y="174">4-pin I2C header</text>
  <circle class="pin-dot pin-3v3" cx="665" cy="194" r="5"/><text class="tiny" x="677" y="198">VCC</text>
  <circle class="pin-dot pin-gnd" cx="712" cy="194" r="5"/><text class="tiny" x="724" y="198">GND</text>
  <circle class="pin-dot pin-i2c" cx="665" cy="110" r="5"/><text class="tiny" x="677" y="114">SDA</text>
  <circle class="pin-dot pin-i2c" cx="712" cy="110" r="5"/><text class="tiny" x="724" y="114">SCL</text>

  <!-- DAC -->
  <rect class="module" x="840" y="318" width="235" height="220" rx="12"/>
  <text class="label" x="958" y="350" text-anchor="middle">PCM5102A DAC</text>
  <text class="small" x="958" y="374" text-anchor="middle">I2S to line out</text>
  <text class="tiny" x="868" y="402">Side header</text>
  <circle class="pin-dot" cx="872" cy="422" r="5"/><text class="tiny" x="888" y="426">SCK open</text>
  <circle class="pin-dot pin-i2s" cx="872" cy="440" r="5"/><text class="tiny" x="888" y="444">BCK</text>
  <circle class="pin-dot pin-i2s" cx="872" cy="458" r="5"/><text class="tiny" x="888" y="462">DIN</text>
  <circle class="pin-dot pin-i2s" cx="872" cy="476" r="5"/><text class="tiny" x="888" y="480">RCK / LRCK</text>
  <circle class="pin-dot pin-gnd" cx="872" cy="494" r="5"/><text class="tiny" x="888" y="498">GND</text>
  <circle class="pin-dot pin-5v" cx="872" cy="512" r="5"/><text class="tiny" x="888" y="516">VIN</text>
  <text class="tiny" x="988" y="402">Bottom pins</text>
  <circle class="pin-dot pin-purple" cx="990" cy="422" r="5"/><text class="tiny" x="1006" y="426">LROUT</text>
  <circle class="pin-dot pin-gnd" cx="990" cy="440" r="5"/><text class="tiny" x="1006" y="444">AGND</text>
  <circle class="pin-dot pin-purple" cx="990" cy="458" r="5"/><text class="tiny" x="1006" y="462">ROUT</text>
  <circle class="pin-dot pin-3v3" cx="990" cy="476" r="5"/><text class="tiny" x="1006" y="480">3.3V</text>
  <circle class="pin-dot" cx="990" cy="494" r="5"/><text class="tiny" x="1006" y="498">FMT / DEMP / FLT</text>
  <circle class="pin-dot pin-3v3" cx="990" cy="512" r="5"/><text class="tiny" x="1006" y="516">XSMT</text>

  <!-- Amp -->
  <rect class="module" x="1130" y="325" width="220" height="230" rx="12"/>
  <text class="label" x="1240" y="357" text-anchor="middle">PAM8403 Amp</text>
  <text class="small" x="1240" y="381" text-anchor="middle">GF1002-style board</text>
  <text class="tiny" x="1154" y="412">Input</text>
  <circle class="pin-dot pin-purple" cx="1158" cy="432" r="5"/><text class="tiny" x="1173" y="436">L</text>
  <circle class="pin-dot pin-gnd" cx="1192" cy="432" r="5"/><text class="tiny" x="1207" y="436">G</text>
  <circle class="pin-dot pin-purple" cx="1226" cy="432" r="5"/><text class="tiny" x="1241" y="436">R</text>
  <text class="tiny" x="1154" y="462">Power</text>
  <circle class="pin-dot pin-5v" cx="1158" cy="482" r="5"/><text class="tiny" x="1173" y="486">+</text>
  <circle class="pin-dot pin-gnd" cx="1192" cy="482" r="5"/><text class="tiny" x="1207" y="486">-</text>
  <text class="tiny" x="1154" y="512">Speaker terminals</text>
  <circle class="pin-dot pin-gray" cx="1158" cy="532" r="5"/><text class="tiny" x="1173" y="536">L+</text>
  <circle class="pin-dot pin-gray" cx="1192" cy="532" r="5"/><text class="tiny" x="1207" y="536">L-</text>
  <circle class="pin-dot pin-gray" cx="1238" cy="532" r="5"/><text class="tiny" x="1253" y="536">R+</text>
  <circle class="pin-dot pin-gray" cx="1272" cy="532" r="5"/><text class="tiny" x="1287" y="536">R-</text>
  <circle cx="1300" cy="437" r="28" fill="#e7edf4" stroke="#aab5c5" stroke-width="2"/>
  <text class="tiny" x="1300" y="442" text-anchor="middle">VOL</text>

  <!-- Speakers -->
  <g>
    <rect class="module" x="1200" y="112" width="140" height="110" rx="12"/>
    <circle cx="1270" cy="167" r="33" fill="#202736"/>
    <circle cx="1270" cy="167" r="17" fill="#3b4659"/>
    <text class="label" x="1270" y="246" text-anchor="middle">Left speaker</text>
  </g>
  <g>
    <rect class="module" x="1200" y="698" width="140" height="110" rx="12"/>
    <circle cx="1270" cy="753" r="33" fill="#202736"/>
    <circle cx="1270" cy="753" r="17" fill="#3b4659"/>
    <text class="label" x="1270" y="832" text-anchor="middle">Right speaker</text>
  </g>

  <!-- Buttons -->
  <g>
    <rect class="module" x="160" y="564" width="190" height="88" rx="12"/>
    <text class="label" x="255" y="598" text-anchor="middle">OLED button</text>
    <text class="small" x="255" y="622" text-anchor="middle">GPIO23 to GND</text>
  </g>
  <g>
    <rect class="module" x="160" y="684" width="190" height="88" rx="12"/>
    <text class="label" x="255" y="718" text-anchor="middle">Power / play button</text>
    <text class="small" x="255" y="742" text-anchor="middle">GPIO24 to GND</text>
  </g>

  <!-- Capacitors note -->
  <rect class="note" x="1098" y="582" width="270" height="82" rx="10"/>
  <text class="label" x="1233" y="614" text-anchor="middle">Amp power capacitors</text>
  <text class="small" x="1233" y="638" text-anchor="middle">1000 uF + 100 nF across</text>
  <text class="small" x="1233" y="658" text-anchor="middle">Power + and Power -</text>

  <!-- Legend -->
  <rect class="legend" x="70" y="86" width="285" height="170" rx="12"/>
  <text class="label" x="94" y="118">Color key</text>
  <line class="wire red" x1="96" y1="145" x2="152" y2="145"/>
  <text class="small" x="166" y="150">5V power</text>
  <line class="wire orange" x1="96" y1="172" x2="152" y2="172"/>
  <text class="small" x="166" y="177">3.3V power</text>
  <line class="wire black" x1="96" y1="199" x2="152" y2="199"/>
  <text class="small" x="166" y="204">ground</text>
  <line class="wire blue" x1="96" y1="226" x2="152" y2="226"/>
  <text class="small" x="166" y="231">I2S audio</text>
  <line class="wire green" x1="230" y1="145" x2="286" y2="145"/>
  <text class="small" x="300" y="150">I2C</text>
  <line class="wire purple" x1="230" y1="172" x2="286" y2="172"/>
  <text class="small" x="300" y="177">analog</text>
  <line class="wire gray" x1="230" y1="199" x2="286" y2="199"/>
  <text class="small" x="300" y="204">speaker</text>
  <line class="wire brown" x1="230" y1="226" x2="286" y2="226"/>
  <text class="small" x="300" y="231">button</text>

  <!-- Pi to DAC: power and I2S -->
  <path class="wire red" d="M 690 360 C 770 432, 782 512, 867 512"/>
  <text class="tiny" x="756" y="408">pin 2 5V -> VIN</text>
  <path class="wire black" d="M 654 420 C 770 522, 780 494, 867 494"/>
  <text class="tiny" x="756" y="458">pin 9 GND -> GND</text>
  <path class="wire blue" d="M 690 435 C 772 552, 782 440, 867 440"/>
  <text class="tiny" x="756" y="488">pin 12 GPIO18 -> BCK</text>
  <path class="wire blue" d="M 654 615 C 790 642, 782 476, 867 476"/>
  <text class="tiny" x="755" y="518">pin 35 GPIO19 -> RCK</text>
  <path class="wire blue" d="M 690 645 C 806 672, 784 458, 867 458"/>
  <text class="tiny" x="754" y="548">pin 40 GPIO21 -> DIN</text>
  <path class="wire orange" d="M 990 512 L 968 512 L 968 476 L 985 476"/>
  <text class="tiny" x="990" y="532">local jumper, not to Pi 5V</text>

  <!-- DAC to amp analog -->
  <path class="wire purple" d="M 995 422 C 1090 412, 1104 432, 1153 432"/>
  <text class="tiny" x="1082" y="402">LROUT -> L</text>
  <path class="wire black" d="M 995 440 C 1090 440, 1105 432, 1187 432"/>
  <text class="tiny" x="1082" y="464">AGND -> G</text>
  <path class="wire purple" d="M 995 458 C 1092 462, 1105 432, 1221 432"/>
  <text class="tiny" x="1082" y="490">ROUT -> R</text>

  <!-- Pi to amp power -->
  <path class="wire red" d="M 690 375 C 930 244, 1060 272, 1153 482"/>
  <text class="tiny" x="885" y="286">pin 4 5V -> amp Power +</text>
  <path class="wire black" d="M 654 420 C 932 690, 1062 640, 1187 482"/>
  <text class="tiny" x="850" y="686">pin 9 GND -> amp Power -</text>

  <!-- Amp to speakers -->
  <path class="wire gray" d="M 1178 532 C 1210 430, 1302 252, 1272 222"/>
  <text class="tiny" x="1188" y="290">Lout+ / Lout-</text>
  <path class="wire gray" d="M 1255 532 C 1288 610, 1302 656, 1272 698"/>
  <text class="tiny" x="1186" y="627">Rout+ / Rout-</text>

  <!-- Pi to OLED -->
  <path class="wire orange" d="M 654 360 C 612 300, 610 220, 665 194"/>
  <text class="tiny" x="522" y="248">pin 1 3.3V -> VCC</text>
  <path class="wire black" d="M 690 450 C 584 304, 640 220, 712 194"/>
  <text class="tiny" x="488" y="278">pin 14 GND -> GND</text>
  <path class="wire green" d="M 654 375 C 690 286, 690 154, 665 110"/>
  <text class="tiny" x="704" y="258">pin 3 GPIO2 -> SDA</text>
  <path class="wire green" d="M 654 390 C 730 300, 724 154, 712 110"/>
  <text class="tiny" x="736" y="288">pin 5 GPIO3 -> SCL</text>

  <!-- Pi to buttons -->
  <path class="wire brown" d="M 690 465 C 532 582, 462 608, 350 608"/>
  <text class="tiny" x="450" y="592">pin 16 GPIO23</text>
  <path class="wire black" d="M 690 495 C 535 535, 462 636, 350 636"/>
  <text class="tiny" x="450" y="642">pin 20 GND</text>
  <path class="wire brown" d="M 690 480 C 525 640, 462 728, 350 728"/>
  <text class="tiny" x="450" y="706">pin 18 GPIO24</text>
  <path class="wire black" d="M 654 540 C 520 548, 462 756, 350 756"/>
  <text class="tiny" x="450" y="770">pin 25 GND</text>

  <text class="small" x="700" y="930" text-anchor="middle">Do not connect speaker minus to Pi GND. The amplifier speaker outputs are bridged outputs.</text>
</svg>
